<header>
  <div class="header container">
    {{if eq .RelPermalink "/"}}
      <div class="header__title_icon">
        {{ readFile "assets/img/SPFGoLogo.svg" | safeHTML }}
      </div>
    {{else}}
      <a href="/" class="header__title_icon">
        {{ readFile "assets/img/SPFGoLogo.svg" | safeHTML }}
      </a>
    {{end}}
    <div class="header__title">
      <span class="header__title_text">Го в <span class="__nowrap">Санкт-Петербурге</span></span>
      <div class="header__navs">
        <a href="/"{{if or (hasPrefix .RelPermalink "/posts/") (eq .RelPermalink "/")}} class="active"{{end}}>Новости</a>
        <a href="/clubs/"{{if hasPrefix .RelPermalink "/clubs/"}} class="active"{{end}}>Клубы</a>
        <a href="/welcome/">Ссылки</a>
        <a href="/contact/"{{if hasPrefix .RelPermalink "/contact/"}} class="active"{{end}}>Контакты</a>
      </div>
    </div>
  </div>
</header>
